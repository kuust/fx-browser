appId: com.fuxin.fxbrowser
productName: FX Browser
files:
  - dist/**
  - dist-electron/**
  - package.json
asar: true
extraResources:
  - from: runtime/fingerprint-chromium
    to: fingerprint-chromium
    filter:
      - "**/*"
directories:
  output: release
win:
  target:
    - nsis
  artifactName: "FX-Browser-${version}-Setup.${ext}"
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
