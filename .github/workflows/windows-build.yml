name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout kuust/fx-browser only
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and test
        run: |
          npm run typecheck
          npm test
          npm run lint:security

      - name: Build Windows installer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          if (Get-Variable PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $false
          }

          npm run package:win
          $buildExit = $LASTEXITCODE

          if (Test-Path release) {
            Get-ChildItem release -Recurse | Select-Object FullName, Length | Format-Table -AutoSize
          }

          $installer = Get-ChildItem release -Filter *.exe -File -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $installer) {
            Write-Error "No Windows .exe installer was produced. electron-builder exit code: $buildExit"
            exit $(if ($buildExit -ne 0) { $buildExit } else { 1 })
          }

          Write-Host "Windows installer produced: $($installer.FullName) ($($installer.Length) bytes)"
          if ($buildExit -ne 0) {
            Write-Warning "electron-builder exited with code $buildExit after producing the .exe; continuing so the installer artifact can be uploaded."
          }
          exit 0
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          DEBUG: electron-builder

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: FX-Browser-Windows
          path: release/*.exe
          if-no-files-found: error
